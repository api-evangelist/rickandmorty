aid: rickandmorty
name: Rick and Morty API
description: Free REST and GraphQL API providing data about characters, locations,
  and episodes from the Rick and Morty animated series. No authentication required.
  Offers access to 826 characters, 126 locations, and 51 episodes with filtering,
  pagination, and character images.
